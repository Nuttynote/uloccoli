<style>

  .editor-line{padding:12px 14px;background:var(--card);border:1.5px solid var(--bdr);border-radius:12px}
  .editor-line-header{display:flex;gap:8px;align-items:center;margin-bottom:8px}

  .click-zone{margin-top:8px;padding:10px 12px;background:rgba(46,125,50,.03);border-radius:8px;border:1px dashed var(--bdr)}
  .click-hint{font-size:11px;color:var(--txt-lt);margin-bottom:8px}

  .click-chord-row{display:flex;flex-wrap:wrap;min-height:22px;margin-bottom:1px}
  .click-chord-cell{display:inline-block;font-family:var(--mono);font-size:12px;vertical-align:top;position:relative}
  .click-chord-mark{color:var(--chord);font-weight:600;cursor:pointer;background:rgba(46,125,50,.12);border-radius:3px;padding:1px 3px;font-size:12px;white-space:nowrap}
  .click-lyric-row{display:flex;flex-wrap:wrap}
  .click-lyric-cell{display:inline-block;font-family:var(--mono);font-size:15px;padding:3px 0;border-bottom:2px solid transparent;border-radius:2px;user-select:none;text-align:left}
  .click-lyric-cell.has-chord{background:rgba(46,125,50,.12);border-bottom-color:var(--accent);cursor:pointer}
  .click-lyric-cell.hoverable{cursor:pointer}
  .click-lyric-cell.hoverable:hover{background:rgba(46,125,50,.06)}

  .add-line-btn{padding:9px 18px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;margin-top:10px}
  .editor-actions{display:flex;justify-content:space-between;align-items:center;margin-top:12px;flex-wrap:wrap;gap:10px}
  .preview-btn{padding:10px 20px;background:var(--card);border:1.5px solid var(--bdr);border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;color:var(--txt)}
  .save-btn{padding:10px 22px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .delete-btn{padding:10px 18px;background:var(--danger-lt);color:var(--danger);border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer}
  .action-right{display:flex;gap:8px}

  .preview-wrap{margin-top:24px}

  /* Loading */
  .loading-wrap{text-align:center;padding:60px 20px;color:var(--txt-lt)}
  .spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--bdr);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
  .loading-text{font-size:13px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 20px;background:var(--txt);color:#fff;border-radius:10px;font-size:13px;z-index:1000;animation:slideIn .3s ease;box-shadow:0 8px 24px rgba(0,0,0,.15)}
  .toast.error{background:var(--danger)}
  .toast.success{background:var(--accent)}

  .spinner-sm{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
</style>

<script>
/* ═══════════════════════════════════════════════════

═══════════════════════════════════════════════════ */
const ADMIN_PASSWORD = "ullocoli2026";

/* Supabase 연결 정보 */
const SUPABASE_URL = "https://xtavorafqxjfkcnfttum.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0YXZvcmFmcXhqZmtjbmZ0dHVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMTgwOTgsImV4cCI6MjA5MTg5NDA5OH0.7WSFf2hYwM9daIe5Hth0nNU530_PmR-mD4RceRd1TXI";
/* ═══════════════════════════════════════════════════ */


/* ═══ SUPABASE API ═══ */
const SB_HEADERS = {
  "apikey": SUPABASE_ANON_KEY,
  "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
  "Content-Type": "application/json",
  "Prefer": "return=representation"
};

async function sbFetchSongs(){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/songs?select=*&order=created_at.desc`,{
    headers: SB_HEADERS
  });
  if(!res.ok) throw new Error("악보를 불러오지 못했습니다");
  const data = await res.json();
  // Convert from DB format (original_key) to JS format (originalKey)
  return data.map(row=>({
    id: row.id,
    title: row.title,
    artist: row.artist,
    originalKey: row.original_key,
    category: row.category,
    text: row.text
  }));
}

async function sbInsertSong(song){
  const body = {
    id: song.id,
    title: song.title,
    artist: song.artist,
    original_key: song.originalKey,
    category: song.category,
    text: song.text
  };
  const res = await fetch(`${SUPABASE_URL}/rest/v1/songs`,{
    method: "POST",
    headers: SB_HEADERS,
    body: JSON.stringify(body)
  });
  if(!res.ok){
    const err = await res.text();
    throw new Error("저장 실패: " + err);
  }
  return res.json();
}

async function sbUpdateSong(song){
  const body = {
    title: song.title,
    artist: song.artist,
    original_key: song.originalKey,
    category: song.category,
    text: song.text
  };
  const res = await fetch(`${SUPABASE_URL}/rest/v1/songs?id=eq.${encodeURIComponent(song.id)}`,{
    method: "PATCH",
    headers: SB_HEADERS,
    body: JSON.stringify(body)
  });
  if(!res.ok) throw new Error("수정 실패");
  return res.json();
}

async function sbDeleteSong(id){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/songs?id=eq.${encodeURIComponent(id)}`,{
    method: "DELETE",
    headers: SB_HEADERS
  });
  if(!res.ok) throw new Error("삭제 실패");
  return true;
}


/* ═══ CORE UTILS ═══ */
const CHROMATIC=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const FLAT_MAP={Db:"C#",Eb:"D#",Fb:"E",Gb:"F#",Ab:"G#",Bb:"A#",Cb:"B"};
const CATEGORIES=["전체","감사","사랑","예배","소망","고백"];

/* 코드를 루트 음별로 그룹화 */
const CHORD_GROUPS=[
  {root:"C", chords:["C","Cm","C7","Cmaj7","Cm7","Csus4","Cadd9","Cdim","Caug","C/E","C/G"]},
  {root:"C#", chords:["C#","C#m","C#7","C#m7","C#maj7"]},
  {root:"D", chords:["D","Dm","D7","Dmaj7","Dm7","Dsus4","Dadd9","D/F#","D/A"]},
  {root:"D#", chords:["D#","D#m","D#7","Eb","Ebm","Eb7"]},
  {root:"E", chords:["E","Em","E7","Emaj7","Em7","Esus4","E/G#","E/B"]},
  {root:"F", chords:["F","Fm","F7","Fmaj7","Fm7","Fsus4","F/A","F/C"]},
  {root:"F#", chords:["F#","F#m","F#7","F#m7","Gb","Gbmaj7"]},
  {root:"G", chords:["G","Gm","G7","Gmaj7","Gm7","Gsus4","Gadd9","G/B","G/D"]},
  {root:"G#", chords:["G#","G#m","G#7","Ab","Abmaj7","Abm"]},
  {root:"A", chords:["A","Am","A7","Amaj7","Am7","Asus4","Aadd9","A/C#","A/E"]},
  {root:"A#", chords:["A#","A#m","Bb","Bbm","Bb7","Bbmaj7"]},
  {root:"B", chords:["B","Bm","B7","Bmaj7","Bm7","Bsus4","B/D#","B/F#"]},
];

function normalizeNote(n){return FLAT_MAP[n]||n;}
function transposeChord(chord,semi){
  return chord.replace(/([A-G][#b]?)/g,m=>{
    const idx=CHROMATIC.indexOf(normalizeNote(m));
    if(idx===-1) return m;
    return CHROMATIC[(idx+semi+120)%12];
  });
}
function isWide(ch){
  const c=ch.charCodeAt(0);
  return (c>=0x1100&&c<=0x115F)||(c>=0x2E80&&c<=0x9FFF)||(c>=0xAC00&&c<=0xD7AF)||(c>=0xF900&&c<=0xFAFF)||(c>=0xFE10&&c<=0xFE6F)||(c>=0xFF01&&c<=0xFF60)||(c>=0xFFE0&&c<=0xFFE6);
}
function cellWidth(ch){return isWide(ch)?"2ch":"1ch";}
function escapeHtml(s){
  if(s==null) return "";
  return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function serialize(lines){
  return lines.map(ln=>{
    if(!ln.lyric&&(!ln.chords||ln.chords.length===0)) return "";
    if(!ln.chords||ln.chords.length===0) return ln.lyric||"";
    const sorted=[...ln.chords].sort((a,b)=>a.pos-b.pos);
    let r="",last=0;
    for(const c of sorted){
      r+=(ln.lyric||"").slice(last,c.pos)+"["+c.chord+"]";
      last=c.pos;
    }
    r+=(ln.lyric||"").slice(last);
    return r;
  }).join("\n");
}

function deserialize(text){
  if(!text) return [{lyric:"",chords:[]}];
  return text.split("\n").map(raw=>{
    if(!raw.trim()) return {lyric:"",chords:[]};
    if(!raw.includes("[")) return {lyric:raw,chords:[]};
    const chords=[];
    let lyric="";
    const re=/\[([^\]]+)\]/g;
    let last=0,m;
    while((m=re.exec(raw))!==null){
      lyric+=raw.slice(last,m.index);
      chords.push({pos:lyric.length,chord:m[1]});
      last=re.lastIndex;
    }
    lyric+=raw.slice(last);
    return {lyric,chords};
  });
}

/* ═══ TOAST ═══ */
function showToast(msg,type="info"){
  const container=document.getElementById("toast-container");
  const toast=document.createElement("div");
  toast.className=`toast ${type}`;
  toast.textContent=msg;
  container.appendChild(toast);
  setTimeout(()=>{
    toast.style.opacity="0";
    toast.style.transition="opacity .3s";
    setTimeout(()=>toast.remove(),300);
  },2500);
}

/* ═══ ADMIN AUTH ═══ */
const ADMIN_SESSION_KEY="ullocoli_admin_session";
function checkAdminAccess(){
  const params=new URLSearchParams(window.location.search);
  const urlPassword=params.get("admin");
  if(urlPassword!==null){
    if(urlPassword===ADMIN_PASSWORD){
      sessionStorage.setItem(ADMIN_SESSION_KEY,"1");
      window.history.replaceState({},document.title,window.location.pathname+window.location.hash);
      return true;
    }else{
      alert("비밀번호가 올바르지 않습니다.");
      window.history.replaceState({},document.title,window.location.pathname+window.location.hash);
      return false;
    }
  }
  return sessionStorage.getItem(ADMIN_SESSION_KEY)==="1";
}
function logoutAdmin(){
  sessionStorage.removeItem(ADMIN_SESSION_KEY);
  State.isAdmin=false;
  State.view="list";
  render();
}

/* ═══ DISPLAY RENDERERS ═══ */
function renderChordLine(lyric,chords,transpose){
  if(!lyric&&(!chords||chords.length===0)) return `<div style="height:14px"></div>`;
  if((!lyric||!lyric.trim())&&chords&&chords.length>0){
    return `<div class="chord-only-row">${chords.map(c=>`<span class="chord-badge">${escapeHtml(transposeChord(c.chord,transpose))}</span>`).join("")}</div>`;
  }
  const chars=[...lyric];
  const chordAt={};
  (chords||[]).forEach(c=>{chordAt[c.pos]=transposeChord(c.chord,transpose);});
  const chordRow=chars.map((ch,i)=>{
    const w=cellWidth(ch);
    const chord=chordAt[i];
    return `<span class="pos-chord-cell" style="width:${w}">${chord?`<span class="pos-chord-text">${escapeHtml(chord)}</span>`:""}</span>`;
  }).join("");
  const lyricRow=chars.map((ch,i)=>{
    return `<span class="pos-lyric-cell" style="width:${cellWidth(ch)}">${escapeHtml(ch)}</span>`;
  }).join("");
  return `<div class="pos-line"><div class="pos-chord-row">${chordRow}</div><div class="pos-lyric-row">${lyricRow}</div></div>`;
}

function renderSheet(song,transpose){
  const lines=deserialize(song.text);
  return `<div class="sheet-card"><div class="sheet">${lines.map(ln=>renderChordLine(ln.lyric,ln.chords,transpose)).join("")}</div></div>`;
}

/* ═══ TARGETED UPDATES ═══ */
function updateChordCell(lineIdx,pos){
  const line=State.ed.lines[lineIdx];
  const chord=(line.chords||[]).find(c=>c.pos===pos)?.chord;
  const cell=document.querySelector(`[data-chord-row="${lineIdx}"] [data-chord-cell="${pos}"]`);
  if(cell) cell.innerHTML=chord?`<span class="click-chord-mark pos-chord-text">${escapeHtml(chord)}</span>`:"";
  const lyricCell=document.querySelector(`[data-lyric-row="${lineIdx}"] [data-pos="${pos}"][data-line="${lineIdx}"]`);
  if(lyricCell){
    if(chord){lyricCell.classList.add("has-chord");lyricCell.classList.remove("hoverable");}
    else{lyricCell.classList.remove("has-chord");lyricCell.classList.add("hoverable");}
  }
}

function rerenderLine(idx){
  const ln=State.ed.lines[idx];
  const lineEl=document.querySelector(`[data-line-idx="${idx}"]`);
  if(!lineEl) return;
  const zone=lineEl.querySelector(`[data-click-zone="${idx}"]`);
  if(!zone) return;
  const chars=ln.lyric?[...ln.lyric]:[];
  if(chars.length===0){zone.style.display="none";return;}
  zone.style.display="";
  const chordMap={};
  (ln.chords||[]).forEach(c=>{chordMap[c.pos]=c.chord;});
  const chordRow=chars.map((ch,pos)=>{
    const w=cellWidth(ch);
    const chord=chordMap[pos];
    return `<span class="click-chord-cell" data-chord-cell="${pos}" style="width:${w}">${chord?`<span class="click-chord-mark pos-chord-text">${escapeHtml(chord)}</span>`:""}</span>`;
  }).join("");
  const lyricRow=chars.map((ch,pos)=>{
    const hasChord=!!chordMap[pos];
    const cls=["click-lyric-cell"];
    if(hasChord) cls.push("has-chord"); else cls.push("hoverable");
    const display=ch===" "?"&nbsp;":escapeHtml(ch);
    return `<span class="${cls.join(" ")}" style="width:${cellWidth(ch)}" data-action="click-char" data-line="${idx}" data-pos="${pos}">${display}</span>`;
  }).join("");
  const chordRowEl=zone.querySelector(`[data-chord-row="${idx}"]`);
  const lyricRowEl=zone.querySelector(`[data-lyric-row="${idx}"]`);
  if(chordRowEl) chordRowEl.innerHTML=chordRow;
  if(lyricRowEl) lyricRowEl.innerHTML=lyricRow;
}

function updateHint(){
  document.querySelectorAll(".click-hint").forEach(el=>{
    el.innerHTML=State.ed.selectedChord
      ?`클릭하면 <strong>${escapeHtml(State.ed.selectedChord)}</strong> 배치 · 초록 표시된 코드 클릭 시 삭제`
      :`위에서 코드를 먼저 선택하세요`;
  });
}
function updateChordPalette(){
  document.querySelectorAll(".chord-palette-btn").forEach(btn=>{
    if(btn.dataset.chord===State.ed.selectedChord) btn.classList.add("active");
    else btn.classList.remove("active");
  });
  const disp=document.getElementById("chord-current-display");
  if(disp) disp.textContent=State.ed.selectedChord||"없음";
}

function toggleChordGroup(root){
  if(State.ed.openGroups.has(root)) State.ed.openGroups.delete(root);
  else State.ed.openGroups.add(root);
  // 해당 그룹의 헤더와 바디만 업데이트 (깜빡임 방지)
  const header=document.querySelector(`.chord-group-header[data-root="${root}"]`);
  const body=document.querySelector(`.chord-group-body[data-group-body="${root}"]`);
  const isOpen=State.ed.openGroups.has(root);
  if(header) header.classList.toggle("open",isOpen);
  if(body) body.classList.toggle("open",isOpen);
}
function updateCatSelection(){
  document.querySelectorAll(".cat-btn").forEach(btn=>{
    if(btn.dataset.cat===State.activeCat) btn.classList.add("active");
    else btn.classList.remove("active");
  });
}
function updateSongList(){
  const listEl=document.getElementById("song-list");
  if(listEl) listEl.innerHTML=renderListContent();
}
function updateTransposeDisplay(){
  const song=State.songs.find(s=>s.id===State.selectedSongId);
  if(!song) return;
  const currentKey=transposeChord(song.originalKey,State.transpose);
  const keyDisp=document.getElementById("key-display");
  const keyOrig=document.getElementById("key-orig");
  const sheet=document.getElementById("sheet-container");
  if(keyDisp) keyDisp.textContent=currentKey;
  if(keyOrig) keyOrig.style.display=State.transpose===0?"none":"";
  if(sheet) sheet.innerHTML=renderSheet(song,State.transpose);
}

function requireAdmin(){

  return true;
}

/* ═══ DELETE ═══ */
async function deleteSong(id){
  const song=State.songs.find(s=>s.id===id);
  if(!song) return;
  if(!confirm(`"${song.title}" 악보를 정말 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`)) return;
  try{
    await sbDeleteSong(id);
    State.songs=State.songs.filter(s=>s.id!==id);
    if(State.selectedSongId===id){State.selectedSongId=null;State.view="list";}
    if(State.editSongId===id){State.editSongId=null;State.view="list";}
    render();
    showToast("삭제되었습니다","success");
  }catch(e){
    showToast("삭제 실패: "+e.message,"error");
  }
}

/* ═══ SAVE ═══ */
async function saveCurrentSong(){
  const ed=State.ed;
  if(!ed.title.trim()){alert("제목을 입력해주세요");return;}
  State.saving=true;
  render();
  const text=serialize(ed.lines);
  const isUpdate=!!State.editSongId;
  const id=State.editSongId||"s"+Date.now();
  const songData={id,title:ed.title,artist:ed.artist,originalKey:ed.originalKey,category:ed.category,text};
  try{
    if(isUpdate){
      await sbUpdateSong(songData);
      State.songs=State.songs.map(s=>s.id===id?songData:s);
    }else{
      await sbInsertSong(songData);
      State.songs=[songData,...State.songs];
    }
    State.saving=false;
    State.view="list";
    State.editSongId=null;
    render();
    showToast(isUpdate?"수정되었습니다":"저장되었습니다","success");
  }catch(e){
    State.saving=false;
    render();
    showToast("저장 실패: "+e.message,"error");
  }
}

/* ═══ EVENTS ═══ */
document.addEventListener("click",e=>{
  const t=e.target.closest("[data-action]");
  if(!t) return;
  const action=t.dataset.action;

  if(action==="reload"){loadSongsFromServer();return;}
  if(action==="cat"){State.activeCat=t.dataset.cat;updateCatSelection();updateSongList();return;}
  if(action==="logout"){logoutAdmin();return;}
  if(action==="open-song"){
    State.selectedSongId=t.dataset.id;State.transpose=0;State.view="song";render();return;
  }
  if(action==="back-list"){State.view="list";render();return;}
  if(action==="transpose"){State.transpose+=parseInt(t.dataset.dir,10);updateTransposeDisplay();return;}
  if(action==="transpose-reset"){State.transpose=0;updateTransposeDisplay();return;}

  if(action==="new-song"){
    if(!requireAdmin()) return;
    State.editSongId=null;initEditor(null);State.view="editor";render();return;
  }
  if(action==="edit-song"){
    if(!requireAdmin()) return;
    e.stopPropagation();
    const song=State.songs.find(s=>s.id===t.dataset.id);
    State.editSongId=t.dataset.id;initEditor(song);State.view="editor";render();return;
  }
  if(action==="delete-song-from-list"){
    if(!requireAdmin()) return;
    e.stopPropagation();
    deleteSong(t.dataset.id);return;
  }
  if(action==="delete-song-from-view"){if(!requireAdmin()) return;deleteSong(t.dataset.id);return;}
  if(action==="delete-song-from-editor"){if(!requireAdmin()) return;deleteSong(State.editSongId);return;}
  if(action==="save-song"){if(!requireAdmin()) return;saveCurrentSong();return;}

  if(action==="toggle-group"){
    toggleChordGroup(t.dataset.root);
    return;
  }
  if(action==="pick-chord"){
    State.ed.selectedChord=t.dataset.chord;
    updateChordPalette();updateHint();return;
  }
  if(action==="ed-custom-submit"){
    if(State.ed.customChord.trim()){
      State.ed.selectedChord=State.ed.customChord.trim();
      State.ed.customChord="";
      const el=document.querySelector('[data-action="ed-custom"]');
      if(el) el.value="";
      updateChordPalette();updateHint();
    }return;
  }
  if(action==="add-line"){
    State.ed.lines.push({lyric:"",chords:[]});
    const wrap=document.getElementById("lines-wrap");
    if(wrap){
      const div=document.createElement("div");
      div.innerHTML=renderLineEditor(State.ed.lines[State.ed.lines.length-1],State.ed.lines.length-1);
      wrap.appendChild(div.firstElementChild);
    }
    return;
  }
  if(action==="delete-line"){
    const idx=parseInt(t.dataset.line,10);
    if(State.ed.lines.length>1){State.ed.lines.splice(idx,1);render();}
    else{State.ed.lines[0]={lyric:"",chords:[]};render();}
    return;
  }
  if(action==="click-char"){
    const lineIdx=parseInt(t.dataset.line,10);
    const pos=parseInt(t.dataset.pos,10);
    const line=State.ed.lines[lineIdx];
    const existing=(line.chords||[]).find(c=>c.pos===pos);
    if(existing) line.chords=line.chords.filter(c=>c.pos!==pos);
    else if(State.ed.selectedChord) line.chords=[...(line.chords||[]).filter(c=>c.pos!==pos),{pos,chord:State.ed.selectedChord}];
    updateChordCell(lineIdx,pos);
    return;
  }
  if(action==="toggle-preview"){
    State.ed.preview=!State.ed.preview;
    t.textContent=State.ed.preview?"✏️ 편집":"👁 미리보기";
    const p=document.getElementById("preview-wrap");
    if(p) p.innerHTML=State.ed.preview?renderPreviewSheet():"";
    return;
  }
});

document.addEventListener("input",e=>{
  const t=e.target.closest("[data-action]");
  if(!t) return;
  const action=t.dataset.action;
  if(action==="search"){State.search=t.value;updateSongList();return;}
  if(action==="ed-title"){State.ed.title=t.value;return;}
  if(action==="ed-artist"){State.ed.artist=t.value;return;}
  if(action==="ed-custom"){State.ed.customChord=t.value;return;}
  if(action==="lyric-change"){
    const idx=parseInt(t.dataset.line,10);
    const val=t.value;
    const line=State.ed.lines[idx];
    line.lyric=val;
    line.chords=(line.chords||[]).filter(c=>c.pos<=[...val].length);
    rerenderLine(idx);
    return;
  }
});

document.addEventListener("change",e=>{
  const t=e.target.closest("[data-action]");
  if(!t) return;
  if(t.dataset.action==="ed-key"){State.ed.originalKey=t.value;return;}
  if(t.dataset.action==="ed-cat"){State.ed.category=t.value;return;}
});

document.addEventListener("keydown",e=>{
  const t=e.target.closest("[data-action]");
  if(!t) return;
  if(t.dataset.action==="ed-custom"&&e.key==="Enter"){
    if(State.ed.customChord.trim()){
      State.ed.selectedChord=State.ed.customChord.trim();
      State.ed.customChord="";
      t.value="";
      updateChordPalette();updateHint();
    }
    return;
  }
  // 가사 입력에서 Enter = 새 줄 추가하고 포커스 이동
  if(t.dataset.action==="lyric-change"&&e.key==="Enter"&&!e.shiftKey){
    e.preventDefault();
    const currentIdx=parseInt(t.dataset.line,10);
    // 새 빈 줄을 현재 줄 바로 다음에 삽입
    const newIdx=currentIdx+1;
    State.ed.lines.splice(newIdx,0,{lyric:"",chords:[]});
    // DOM도 그 위치에 삽입
    const wrap=document.getElementById("lines-wrap");
    if(wrap){
      // 이후 줄들의 data-line 값이 틀어지므로 재렌더가 필요함
      wrap.innerHTML=State.ed.lines.map((ln,idx)=>renderLineEditor(ln,idx)).join("");
      // 새 줄의 input에 포커스
      requestAnimationFrame(()=>{
        const newInput=document.querySelector(`[data-action="lyric-change"][data-line="${newIdx}"]`);
        if(newInput) newInput.focus();
      });
    }
    return;
  }
});

/* ═══ INIT ═══ */
render();
loadSongsFromServer();
</script>
</body>
</html>
