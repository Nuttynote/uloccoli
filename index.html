<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  @font-face{font-family:'MapoFlowerIsland';src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/MapoFlowerIslandA.woff') format('woff');font-weight:normal;font-style:normal;font-display:swap}

    --bg:#F4F9F0;--card:#FAFDF7;
    --accent:#2E7D32;--accent-lt:#66BB6A;--accent-pale:#A5D6A7;
    --txt:#1B3A1D;--txt-lt:#5A7A5C;--bdr:#C8E6C9;

    --glow:rgba(46,125,50,.07);
    --danger:#C53030;--danger-lt:#FED7D7;
    --font:'Noto Sans KR',sans-serif;

    --mono:'DM Mono',monospace;
  }
  @keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}

  html,body{min-height:100vh;background:var(--bg)}
  body{font-family:var(--font);color:var(--txt);background:linear-gradient(180deg,var(--bg) 0%,#FAFDF7 50%,var(--bg) 100%);min-height:100vh}
  input:focus,select:focus{outline:none;border-color:var(--accent)!important;box-shadow:0 0 0 3px rgba(46,125,50,.12)}
  button{font-family:var(--font)}

  button:disabled{opacity:.5;cursor:not-allowed}

  .container{max-width:720px;margin:0 auto;padding:0 20px 40px;min-height:100vh}
  .view{animation:slideIn .35s ease}

  .header{text-align:center;padding:44px 0 28px;animation:fadeIn .6s ease}
  .header-decor{font-size:40px;margin-bottom:6px;animation:float 3s ease-in-out infinite}
  .logo{font-family:var(--handwriting);font-size:36px;font-weight:normal;letter-spacing:.02em;margin-bottom:2px}

  .subtitle{font-size:12.5px;color:var(--txt-lt);font-weight:300}

  .toolbar{display:flex;gap:8px;margin-bottom:12px;align-items:center}

  .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:14px;opacity:.45;z-index:1}
  .search-input{width:100%;padding:12px 16px 12px 40px;border:1.5px solid var(--bdr);border-radius:12px;font-size:14px;font-family:var(--font);background:var(--card);color:var(--txt)}

  .admin-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--glow);border:1.5px solid var(--bdr);border-radius:12px;margin-bottom:12px;animation:fadeIn .3s ease;flex-wrap:wrap;gap:8px}
  .admin-label{font-size:13px;font-weight:600;color:var(--accent)}
  .admin-actions{display:flex;gap:8px;align-items:center}
  .add-btn{padding:8px 16px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
  .logout-btn{padding:8px 14px;background:transparent;color:var(--txt-lt);border:1.5px solid var(--bdr);border-radius:8px;font-size:12px;font-weight:500;cursor:pointer}

  .cat-wrap{display:flex;gap:7px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px}
  .cat-btn{padding:7px 16px;border:1.5px solid var(--bdr);border-radius:20px;background:transparent;color:var(--txt-lt);font-size:12.5px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .2s}
  .cat-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

  .list{display:flex;flex-direction:column;gap:10px}
  .card{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;background:var(--card);border:1.5px solid var(--bdr);border-radius:14px;cursor:pointer;transition:all .2s;animation:fadeIn .4s ease}

  .card-cat{font-size:10.5px;font-weight:600;color:var(--accent);letter-spacing:.06em;margin-bottom:5px;text-transform:uppercase}
  .card-title{font-family:var(--handwriting);font-size:18px;font-weight:normal;margin-bottom:3px}
  .card-artist{font-size:12.5px;color:var(--txt-lt);margin-bottom:6px}
  .card-key{font-size:11.5px;color:var(--accent-lt);font-weight:500;font-family:var(--mono)}
  .card-arrow{font-size:18px;color:var(--bdr)}
  .card-actions{display:flex;align-items:center;gap:6px}
  .card-icon-btn{width:32px;height:32px;border:1.5px solid var(--bdr);border-radius:8px;background:var(--card);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .card-icon-btn.danger:hover{background:var(--danger-lt);border-color:var(--danger);color:var(--danger)}
  .empty{text-align:center;padding:50px 20px;color:var(--txt-lt);font-size:14px}
  .empty-sub{font-size:12.5px;color:var(--txt-lt);margin-top:6px;opacity:.8}

  .footer{text-align:center;margin-top:40px;padding:28px 0;border-top:1px solid var(--bdr)}

  .footer-main{font-family:var(--handwriting);font-size:14px;font-weight:normal;margin-bottom:3px}

  .back-btn{display:inline-flex;align-items:center;padding:9px 16px;background:transparent;border:1.5px solid var(--bdr);border-radius:10px;font-size:13px;color:var(--txt-lt);cursor:pointer;margin-top:20px;margin-bottom:18px}
  .back-btn span{margin-right:6px}
  .song-header{text-align:center;margin-bottom:20px;position:relative}
  .song-title-big{font-family:var(--handwriting);font-size:30px;font-weight:normal;margin-bottom:4px}
  .song-artist-text{font-size:13px;color:var(--txt-lt)}
  .song-header-actions{margin-top:12px;display:flex;justify-content:center;gap:8px}
  .transpose-bar{display:flex;flex-direction:column;align-items:center;gap:10px;padding:16px 20px;background:var(--glow);border:1.5px solid var(--bdr);border-radius:14px;margin-bottom:20px}

  .section-name-input{padding:6px 10px;border:1.5px solid var(--bdr);border-radius:6px;font-size:13px;font-family:var(--mono);font-weight:600;color:var(--accent);background:#fff;width:120px}
  .section-actions{display:flex;gap:4px;margin-left:auto}

    .logo{font-size:24px}

  .form-label{display:block;font-size:12.5px;font-weight:600;color:var(--txt-lt);margin-bottom:6px}
  .form-input{width:100%;padding:11px 14px;border:1.5px solid var(--bdr);border-radius:10px;font-size:14px;font-family:var(--font);background:var(--card);color:var(--txt)}

  .editor-tip{font-size:11.5px;color:var(--txt-lt);padding:10px 14px;background:var(--glow);border:1.5px solid var(--bdr);border-radius:10px;margin-bottom:14px;line-height:1.6}
  .editor-tip strong{color:var(--accent)}

  .lines-wrap{display:flex;flex-direction:column;gap:8px}
  .editor-line{padding:12px 14px;background:var(--card);border:1.5px solid var(--bdr);border-radius:12px;position:relative;transition:border-color .15s}
  .editor-line.selected{border-color:var(--accent);background:rgba(46,125,50,.04)}
  .editor-line-header{display:flex;gap:8px;align-items:center;margin-bottom:8px}
  .line-checkbox{width:18px;height:18px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
  .editor-lyric-input{flex:1;padding:10px 12px;border:1.5px solid var(--bdr);border-radius:8px;font-size:14px;font-family:var(--mono);background:#fff;color:var(--txt)}
  .editor-line-delete{width:28px;height:28px;border:none;border-radius:6px;background:rgba(197,48,48,.08);color:var(--danger);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .lines-toolbar{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center}
  .lines-toolbar-btn{padding:8px 14px;border:1.5px solid var(--bdr);border-radius:8px;background:var(--card);font-size:12.5px;font-weight:500;cursor:pointer;color:var(--txt);transition:all .15s}
  .lines-toolbar-btn:hover{border-color:var(--accent-lt)}
  .lines-toolbar-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .select-count{font-size:11.5px;color:var(--txt-lt)}
  .click-zone{margin-top:8px;padding:18px 12px 10px;background:rgba(46,125,50,.03);border-radius:8px;border:1px dashed var(--bdr)}
  .click-chord-row{display:flex;flex-wrap:wrap;min-height:22px;margin-bottom:1px}
  .click-chord-cell{display:inline-block;font-family:var(--mono);font-size:12px;vertical-align:top;position:relative}
  .click-chord-mark{color:var(--chord);font-weight:600;cursor:pointer;background:rgba(46,125,50,.12);border-radius:3px;padding:1px 3px;font-size:12px;white-space:nowrap}
  .click-chord-mark:hover{background:rgba(46,125,50,.22)}
  .click-lyric-row{display:flex;flex-wrap:wrap;position:relative}
  .click-lyric-cell{display:inline-block;font-family:var(--mono);font-size:15px;padding:3px 0;border-bottom:2px solid transparent;border-radius:2px;user-select:none;text-align:left;cursor:pointer;position:relative}
  .click-lyric-cell.has-chord{background:rgba(46,125,50,.12);border-bottom-color:var(--accent)}
  .click-lyric-cell:hover{background:rgba(46,125,50,.06)}
  .click-lyric-cell.editing{background:rgba(46,125,50,.15);border-bottom-color:var(--accent)}

  .add-line-btn{padding:9px 18px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;margin-top:10px}
  .editor-actions{display:flex;justify-content:space-between;align-items:center;margin-top:12px;flex-wrap:wrap;gap:10px}
  .preview-btn{padding:10px 20px;background:var(--card);border:1.5px solid var(--bdr);border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;color:var(--txt)}
  .save-btn{padding:10px 22px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .delete-btn{padding:10px 18px;background:var(--danger-lt);color:var(--danger);border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer}
  .action-right{display:flex;gap:8px}

  .preview-wrap{margin-top:24px}

  /* Loading */
  .loading-wrap{text-align:center;padding:60px 20px;color:var(--txt-lt)}
  .spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--bdr);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
  .loading-text{font-size:13px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 20px;background:var(--txt);color:#fff;border-radius:10px;font-size:13px;z-index:1000;animation:slideIn .3s ease;box-shadow:0 8px 24px rgba(0,0,0,.15)}
  .toast.error{background:var(--danger)}
  .toast.success{background:var(--accent)}

  .spinner-sm{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
</style>

<script>
/* ═══════════════════════════════════════════════════

═══════════════════════════════════════════════════ */
const ADMIN_PASSWORD = "ullocoli2026";

/* Supabase 연결 정보 */
const SUPABASE_URL = "https://xtavorafqxjfkcnfttum.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0YXZvcmFmcXhqZmtjbmZ0dHVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMTgwOTgsImV4cCI6MjA5MTg5NDA5OH0.7WSFf2hYwM9daIe5Hth0nNU530_PmR-mD4RceRd1TXI";
/* ═══════════════════════════════════════════════════ */


/* ═══ SUPABASE API ═══ */
const SB_HEADERS = {
  "apikey": SUPABASE_ANON_KEY,
  "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
  "Content-Type": "application/json",
  "Prefer": "return=representation"
};

async function sbFetchSongs(){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/songs?select=*&order=created_at.desc`,{
    headers: SB_HEADERS
  });
  if(!res.ok) throw new Error("악보를 불러오지 못했습니다");
  const data = await res.json();
  // Convert from DB format (original_key) to JS format (originalKey)
  return data.map(row=>({
    id: row.id,
    title: row.title,
    artist: row.artist,
    originalKey: row.original_key,
    category: row.category,
    text: row.text
  }));
}

async function sbInsertSong(song){
  const body = {
    id: song.id,
    title: song.title,
    artist: song.artist,
    original_key: song.originalKey,
    category: song.category,
    text: song.text
  };
  const res = await fetch(`${SUPABASE_URL}/rest/v1/songs`,{
    method: "POST",
    headers: SB_HEADERS,
    body: JSON.stringify(body)
  });
  if(!res.ok){
    const err = await res.text();
    throw new Error("저장 실패: " + err);
  }
  return res.json();
}

async function sbUpdateSong(song){
  const body = {
    title: song.title,
    artist: song.artist,
    original_key: song.originalKey,
    category: song.category,
    text: song.text
  };
  const res = await fetch(`${SUPABASE_URL}/rest/v1/songs?id=eq.${encodeURIComponent(song.id)}`,{
    method: "PATCH",
    headers: SB_HEADERS,
    body: JSON.stringify(body)
  });
  if(!res.ok) throw new Error("수정 실패");
  return res.json();
}

async function sbDeleteSong(id){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/songs?id=eq.${encodeURIComponent(id)}`,{
    method: "DELETE",
    headers: SB_HEADERS
  });
  if(!res.ok) throw new Error("삭제 실패");
  return true;
}


/* ═══ CORE UTILS ═══ */
const CHROMATIC=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const FLAT_MAP={Db:"C#",Eb:"D#",Fb:"E",Gb:"F#",Ab:"G#",Bb:"A#",Cb:"B"};
const CATEGORIES=["전체","감사","사랑","예배","소망","고백"];

function normalizeNote(n){return FLAT_MAP[n]||n;}
function transposeChord(chord,semi){
  return chord.replace(/([A-G][#b]?)/g,m=>{
    const idx=CHROMATIC.indexOf(normalizeNote(m));
    if(idx===-1) return m;
    return CHROMATIC[(idx+semi+120)%12];
  });
}
function isWide(ch){
  const c=ch.charCodeAt(0);
  return (c>=0x1100&&c<=0x115F)||(c>=0x2E80&&c<=0x9FFF)||(c>=0xAC00&&c<=0xD7AF)||(c>=0xF900&&c<=0xFAFF)||(c>=0xFE10&&c<=0xFE6F)||(c>=0xFF01&&c<=0xFF60)||(c>=0xFFE0&&c<=0xFFE6);
}
function cellWidth(ch){return isWide(ch)?"2ch":"1ch";}
function escapeHtml(s){
  if(s==null) return "";
  return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

/*
  저장 형식: 섹션은 ---섹션이름--- 으로 구분
  예:
  ---Intro---
  [G]  [D]  [Em]  [C]
  ---Verse 1---
  [G]감사해 주님의 [D]은혜에
  ---Chorus---
  [C]할렐루야
*/
function serialize(sections){
  return sections.map(sec=>{
    const header=`---${sec.name}---`;
    const body=sec.lines.map(ln=>{
      if(!ln.lyric&&(!ln.chords||ln.chords.length===0)) return "";
      if(!ln.chords||ln.chords.length===0) return ln.lyric||"";
      const sorted=[...ln.chords].sort((a,b)=>a.pos-b.pos);
      let r="",last=0;
      for(const c of sorted){
        r+=(ln.lyric||"").slice(last,c.pos)+"["+c.chord+"]";
        last=c.pos;
      }
      r+=(ln.lyric||"").slice(last);
      return r;
    }).join("\n");
    return header+"\n"+body;
  }).join("\n");
}

function deserialize(text){
  if(!text) return [{name:"Verse",lines:[{lyric:"",chords:[]}]}];
  const sections=[];
  let currentSection=null;
  text.split("\n").forEach(raw=>{
    const secMatch=raw.match(/^---(.+)---$/);
    if(secMatch){
      currentSection={name:secMatch[1],lines:[]};
      sections.push(currentSection);
      return;
    }
    if(!currentSection){
      currentSection={name:"Verse",lines:[]};
      sections.push(currentSection);
    }
    if(!raw.trim()){currentSection.lines.push({lyric:"",chords:[]});return;}
    if(!raw.includes("[")){currentSection.lines.push({lyric:raw,chords:[]});return;}
    const chords=[];
    let lyric="";
    const re=/\[([^\]]+)\]/g;
    let last=0,m;
    while((m=re.exec(raw))!==null){
      lyric+=raw.slice(last,m.index);
      chords.push({pos:lyric.length,chord:m[1]});
      last=re.lastIndex;
    }
    lyric+=raw.slice(last);
    currentSection.lines.push({lyric,chords});
  });
  if(sections.length===0) return [{name:"Verse",lines:[{lyric:"",chords:[]}]}];
  return sections;
}

/* 이전 형식(섹션 없는) 호환: 섹션 마커 없으면 하나의 Verse로 감싸기 */
function ensureSections(text){
  if(!text) return [{name:"Verse",lines:[{lyric:"",chords:[]}]}];
  if(text.includes("---")) return deserialize(text);
  // 구 형식: 전체를 하나의 섹션으로
  const lines=text.split("\n").map(raw=>{
    if(!raw.trim()) return {lyric:"",chords:[]};
    if(!raw.includes("[")) return {lyric:raw,chords:[]};
    const chords=[];
    let lyric="";
    const re=/\[([^\]]+)\]/g;
    let last=0,m;
    while((m=re.exec(raw))!==null){
      lyric+=raw.slice(last,m.index);
      chords.push({pos:lyric.length,chord:m[1]});
      last=re.lastIndex;
    }
    lyric+=raw.slice(last);
    return {lyric,chords};
  });
  return [{name:"Verse",lines}];
}

/* 코드 접미사(sus4, maj7, add9 등)를 작게 표시
   단, 분수코드(A/E, D/F#)는 전부 크게 유지 */
function formatChordHtml(chord){
  // 분수코드 분리: "A/E", "D/F#", "G/B" 등
  const slashMatch=chord.match(/^([A-G][#b]?[^/]*)(\/[A-G][#b]?)$/);
  if(slashMatch){
    // 앞부분(A, Am, Am7 등)은 포맷 적용, /E 부분은 루트 크기로
    const front=formatChordPart(slashMatch[1]);
    const bass=`<span class="chord-root">${escapeHtml(slashMatch[2])}</span>`;
    return front+bass;
  }
  return formatChordPart(chord);
}

function formatChordPart(part){
  const m=part.match(/^([A-G][#b]?)(m(?!aj)|M)?(.*)$/);
  if(!m) return escapeHtml(part);
  const root=m[1]+(m[2]||""); // "A", "Am", "C#m" 등 - 루트+m은 크게
  const tail=m[3]||"";        // "7", "sus4", "maj7", "add9" 등 - 작게
  if(!tail) return `<span class="chord-root">${escapeHtml(root)}</span>`;
  return `<span class="chord-root">${escapeHtml(root)}</span><span class="chord-suffix">${escapeHtml(tail)}</span>`;
}

function renderChordLine(lyric,chords,transpose){
  if(!lyric&&(!chords||chords.length===0)) return `<div style="height:14px"></div>`;
  if((!lyric||!lyric.trim())&&chords&&chords.length>0){
    return `<div class="chord-only-row">${chords.map(c=>`<span class="chord-badge">${formatChordHtml(transposeChord(c.chord,transpose))}</span>`).join("")}</div>`;
  }
  const chars=[...lyric];
  const chordAt={};
  (chords||[]).forEach(c=>{chordAt[c.pos]=transposeChord(c.chord,transpose);});
  const sorted=[...(chords||[])].sort((a,b)=>a.pos-b.pos);

  // 각 글자의 너비 (ch 단위)
  const cellW=chars.map(ch=>isWide(ch)?2:1);

  // 코드 겹침 방지: 부족한 너비를 구간 내 셀들에 고르게 분산
  for(let ci=0;ci<sorted.length;ci++){
    const c=sorted[ci];
    const chordText=transposeChord(c.chord,transpose);
    const chordLen=chordText.length+1; // 코드 길이 + 여백 1ch
    const nextPos=ci<sorted.length-1?sorted[ci+1].pos:chars.length;
    let availW=0;
    const spanStart=c.pos;
    const spanEnd=Math.min(nextPos,chars.length);
    const spanCount=spanEnd-spanStart;
    for(let j=spanStart;j<spanEnd;j++) availW+=cellW[j];
    if(chordLen>availW&&spanCount>0){
      const deficit=chordLen-availW;
      const perCell=deficit/spanCount;
      for(let j=spanStart;j<spanEnd;j++) cellW[j]+=perCell;
    }
  }

  // 코드와 가사를 하나의 셀에 함께 배치 (동일 너비 공유)
  const row=chars.map((ch,i)=>{
    const w=cellW[i];
    const chord=chordAt[i];
    return `<span class="pos-char-wrap" style="width:${w}ch">${chord?`<span class="pos-chord-text">${formatChordHtml(chord)}</span>`:""}<span class="pos-lyric-char">${escapeHtml(ch)}</span></span>`;
  }).join("");
  return `<div class="pos-line">${row}</div>`;
}

function renderSheet(song,transpose){
  const sections=ensureSections(song.text);

    const label=`<div class="section-label">${escapeHtml(sec.name)}</div>`;
    const body=sec.lines.map(ln=>renderChordLine(ln.lyric,ln.chords,transpose)).join("");
    return label+body;
  }).join("");
  return `<div class="sheet-card"><div class="sheet"><div class="sheet-scaler"><div class="sheet-inner">${inner}</div></div></div></div>`;
}

function renderLineEditor(ln,secIdx,lineIdx){
  const chars=ln.lyric?[...ln.lyric]:[];
  const chordMap={};
  (ln.chords||[]).forEach(c=>{chordMap[c.pos]=c.chord;});
  const editing=State.ed.editing;
  const isEditingThis=editing&&editing.secIdx===secIdx&&editing.lineIdx===lineIdx;

  const chordRow=chars.map((ch,pos)=>{
    const w=cellWidth(ch);
    const chord=chordMap[pos];
    const isEditing=isEditingThis&&editing.pos===pos;
    let inner="";
    if(isEditing){
      inner=`<input class="inline-chord-input" data-action="inline-chord" data-sec="${secIdx}" data-line="${lineIdx}" data-pos="${pos}" value="${escapeHtml(editing.value||"")}" placeholder="코드" autocomplete="off"/>`;
    }else if(chord){
      inner=`<span class="click-chord-mark pos-chord-text">${escapeHtml(chord)}</span>`;
    }
    return `<span class="click-chord-cell" data-chord-cell="${pos}" style="width:${w}">${inner}</span>`;
  }).join("");

  const lyricRow=chars.map((ch,pos)=>{
    const hasChord=!!chordMap[pos];
    const isEditing=isEditingThis&&editing.pos===pos;
    const cls=["click-lyric-cell"];
    if(hasChord) cls.push("has-chord");
    if(isEditing) cls.push("editing");
    const display=ch===" "?"&nbsp;":escapeHtml(ch);
    return `<span class="${cls.join(" ")}" style="width:${cellWidth(ch)}" data-action="click-char" data-sec="${secIdx}" data-line="${lineIdx}" data-pos="${pos}">${display}</span>`;
  }).join("");

  return `
    <div class="editor-line" data-sec-idx="${secIdx}" data-line-idx="${lineIdx}">
      <div class="editor-line-header">
        <input class="editor-lyric-input" value="${escapeHtml(ln.lyric||"")}" placeholder="가사를 입력하세요 (공백으로 코드 전용 줄)" data-action="lyric-change" data-sec="${secIdx}" data-line="${lineIdx}"/>
        <button class="editor-line-delete" data-action="delete-line" data-sec="${secIdx}" data-line="${lineIdx}">✕</button>
      </div>
      <div class="click-zone" data-click-zone="${secIdx}-${lineIdx}" style="${chars.length===0?'display:none':''}">
        <div class="click-chord-row" data-chord-row="${secIdx}-${lineIdx}">${chordRow}</div>
        <div class="click-lyric-row" data-lyric-row="${secIdx}-${lineIdx}">${lyricRow}</div>
      </div>
    </div>`;
}

/* ═══ MAIN RENDER ═══ */
function render(){
  const app=document.getElementById("app");
  let html="";
  if(State.view==="song") html=renderSongView();
  else if(State.view==="editor") html=renderEditorView();
  else html=renderListView();
  app.innerHTML=html;
  requestAnimationFrame(autoFitSheets);
}

/*
  악보 자동 스케일링:
  악보의 실제 너비가 컨테이너보다 넓으면 transform:scale()로 축소.
  글씨 크기를 직접 바꾸는 게 아니라 전체 악보를 비율로 줄이므로
  코드 위치가 절대 깨지지 않음.
*/
function autoFitSheets(){
  document.querySelectorAll(".sheet-scaler").forEach(scaler=>{
    const inner=scaler.querySelector(".sheet-inner");
    if(!inner) return;
    // 리셋 후 측정
    inner.style.transform="none";
    scaler.style.height="auto";
    const containerW=scaler.clientWidth;
    const contentW=inner.scrollWidth;
    if(contentW>containerW&&containerW>0){
      const scale=containerW/contentW;
      inner.style.transform=`scale(${scale})`;
      // 높이 보정 (scale로 줄어든 만큼)
      scaler.style.height=(inner.scrollHeight*scale)+"px";
    }else{
      inner.style.transform="none";
      scaler.style.height="auto";
    }
  });
}

// 화면 크기 변경 시에도 재조정 (가로/세로 전환 등)
window.addEventListener("resize",()=>{
  clearTimeout(window._resizeTimer);
  window._resizeTimer=setTimeout(autoFitSheets,150);
});

/* ═══ TARGETED UPDATES ═══ */
function getLine(secIdx,lineIdx){
  return State.ed.sections[secIdx]?.lines[lineIdx];
}

function closeChordEditor(save=true){
  const editing=State.ed.editing;
  if(!editing) return;
  const {secIdx,lineIdx,pos,value}=editing;
  const line=getLine(secIdx,lineIdx);
  if(save&&line){
    const trimmed=(value||"").trim();
    if(trimmed) line.chords=[...(line.chords||[]).filter(c=>c.pos!==pos),{pos,chord:trimmed}];
    else line.chords=(line.chords||[]).filter(c=>c.pos!==pos);
  }
  State.ed.editing=null;
  const key=`${secIdx}-${lineIdx}`;
  const cell=document.querySelector(`[data-chord-row="${key}"] [data-chord-cell="${pos}"]`);
  const lyricCell=document.querySelector(`[data-lyric-row="${key}"] [data-pos="${pos}"][data-sec="${secIdx}"][data-line="${lineIdx}"]`);
  if(line){
    const chord=(line.chords||[]).find(c=>c.pos===pos)?.chord;
    if(cell) cell.innerHTML=chord?`<span class="click-chord-mark pos-chord-text">${escapeHtml(chord)}</span>`:"";
    if(lyricCell){
      if(chord) lyricCell.classList.add("has-chord"); else lyricCell.classList.remove("has-chord");
      lyricCell.classList.remove("editing");
    }
  }
}

function openChordEditor(secIdx,lineIdx,pos){
  if(State.ed.editing) closeChordEditor(true);
  const line=getLine(secIdx,lineIdx);
  if(!line) return;
  const existing=(line.chords||[]).find(c=>c.pos===pos)?.chord||"";
  State.ed.editing={secIdx,lineIdx,pos,value:existing};
  const key=`${secIdx}-${lineIdx}`;
  const cell=document.querySelector(`[data-chord-row="${key}"] [data-chord-cell="${pos}"]`);
  const lyricCell=document.querySelector(`[data-lyric-row="${key}"] [data-pos="${pos}"][data-sec="${secIdx}"][data-line="${lineIdx}"]`);
  if(cell){
    cell.innerHTML=`<input class="inline-chord-input" data-action="inline-chord" data-sec="${secIdx}" data-line="${lineIdx}" data-pos="${pos}" value="${escapeHtml(existing)}" placeholder="코드" autocomplete="off"/>`;
    const input=cell.querySelector("input");
    if(input){input.focus();input.select();}
  }
  if(lyricCell) lyricCell.classList.add("editing");
}

function rerenderLine(secIdx,lineIdx){
  const ln=getLine(secIdx,lineIdx);
  if(!ln) return;
  const key=`${secIdx}-${lineIdx}`;
  const lineEl=document.querySelector(`[data-sec-idx="${secIdx}"][data-line-idx="${lineIdx}"]`);
  if(!lineEl) return;
  const zone=lineEl.querySelector(`[data-click-zone="${key}"]`);
  if(!zone) return;
  const chars=ln.lyric?[...ln.lyric]:[];
  if(chars.length===0){zone.style.display="none";return;}
  zone.style.display="";
  const chordMap={};
  (ln.chords||[]).forEach(c=>{chordMap[c.pos]=c.chord;});
  const chordRow=chars.map((ch,pos)=>{
    const w=cellWidth(ch);
    const chord=chordMap[pos];
    return `<span class="click-chord-cell" data-chord-cell="${pos}" style="width:${w}">${chord?`<span class="click-chord-mark pos-chord-text">${escapeHtml(chord)}</span>`:""}</span>`;
  }).join("");
  const lyricRow=chars.map((ch,pos)=>{
    const hasChord=!!chordMap[pos];
    const cls=["click-lyric-cell"];
    if(hasChord) cls.push("has-chord");
    const display=ch===" "?"&nbsp;":escapeHtml(ch);
    return `<span class="${cls.join(" ")}" style="width:${cellWidth(ch)}" data-action="click-char" data-sec="${secIdx}" data-line="${lineIdx}" data-pos="${pos}">${display}</span>`;
  }).join("");
  const cEl=zone.querySelector(`[data-chord-row="${key}"]`);
  const lEl=zone.querySelector(`[data-lyric-row="${key}"]`);
  if(cEl) cEl.innerHTML=chordRow;
  if(lEl) lEl.innerHTML=lyricRow;
}

function updateCatSelection(){
  document.querySelectorAll(".cat-btn").forEach(btn=>{
    if(btn.dataset.cat===State.activeCat) btn.classList.add("active");
    else btn.classList.remove("active");
  });
}
function updateSongList(){
  const listEl=document.getElementById("song-list");
  if(listEl) listEl.innerHTML=renderListContent();
}
function updateTransposeDisplay(){
  const song=State.songs.find(s=>s.id===State.selectedSongId);
  if(!song) return;
  const currentKey=transposeChord(song.originalKey,State.transpose);
  const keyDisp=document.getElementById("key-display");
  const keyOrig=document.getElementById("key-orig");
  const sheet=document.getElementById("sheet-container");
  if(keyDisp) keyDisp.textContent=currentKey;
  if(keyOrig) keyOrig.style.display=State.transpose===0?"none":"";
  if(sheet) sheet.innerHTML=renderSheet(song,State.transpose);
  requestAnimationFrame(autoFitSheets);
}

/* ═══ GUARDS ═══ */
function requireAdmin(){
  if(!State.isAdmin){alert("관리자만 사용할 수 있는 기능입니다.");return false;}
  return true;
}

/* ═══ DELETE ═══ */
async function deleteSong(id){
  const song=State.songs.find(s=>s.id===id);
  if(!song) return;
  if(!confirm(`"${song.title}" 악보를 정말 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`)) return;
  try{
    await sbDeleteSong(id);
    State.songs=State.songs.filter(s=>s.id!==id);
    if(State.selectedSongId===id){State.selectedSongId=null;State.view="list";}
    if(State.editSongId===id){State.editSongId=null;State.view="list";}
    render();
    showToast("삭제되었습니다","success");
  }catch(e){
    showToast("삭제 실패: "+e.message,"error");
  }
}

/* ═══ SAVE ═══ */
async function saveCurrentSong(){
  const ed=State.ed;
  if(!ed.title.trim()){alert("제목을 입력해주세요");return;}
  State.saving=true;
  render();
  const text=serialize(ed.sections);
  const isUpdate=!!State.editSongId;
  const id=State.editSongId||"s"+Date.now();
  const songData={id,title:ed.title,artist:ed.artist,originalKey:ed.originalKey,category:ed.category,text};
  try{
    if(isUpdate){
      await sbUpdateSong(songData);
      State.songs=State.songs.map(s=>s.id===id?songData:s);
    }else{
      await sbInsertSong(songData);
      State.songs=[songData,...State.songs];
    }
    State.saving=false;
    State.view="list";
    State.editSongId=null;
    render();
    showToast(isUpdate?"수정되었습니다":"저장되었습니다","success");
  }catch(e){
    State.saving=false;
    render();
    showToast("저장 실패: "+e.message,"error");
  }
}

/* ═══ EVENTS ═══ */
document.addEventListener("click",e=>{
  const t=e.target.closest("[data-action]");
  if(!t) return;
  const action=t.dataset.action;

  if(action==="reload"){loadSongsFromServer();return;}
  if(action==="cat"){State.activeCat=t.dataset.cat;updateCatSelection();updateSongList();return;}
  if(action==="logout"){logoutAdmin();return;}
  if(action==="open-song"){State.selectedSongId=t.dataset.id;State.transpose=0;State.view="song";render();return;}
  if(action==="back-list"){State.view="list";render();return;}
  if(action==="transpose"){State.transpose+=parseInt(t.dataset.dir,10);updateTransposeDisplay();return;}
  if(action==="transpose-reset"){State.transpose=0;updateTransposeDisplay();return;}

  if(action==="new-song"){if(!requireAdmin()) return;State.editSongId=null;initEditor(null);State.view="editor";render();return;}
  if(action==="edit-song"){
    if(!requireAdmin()) return;
    e.stopPropagation();
    const song=State.songs.find(s=>s.id===t.dataset.id);
    State.editSongId=t.dataset.id;initEditor(song);State.view="editor";render();return;
  }
  if(action==="delete-song-from-list"){if(!requireAdmin()) return;e.stopPropagation();deleteSong(t.dataset.id);return;}
  if(action==="delete-song-from-view"){if(!requireAdmin()) return;deleteSong(t.dataset.id);return;}
  if(action==="delete-song-from-editor"){if(!requireAdmin()) return;deleteSong(State.editSongId);return;}
  if(action==="save-song"){if(!requireAdmin()) return;saveCurrentSong();return;}

  // ── Section actions ──
  if(action==="add-section"){
    State.ed.sections.push({name:"Verse",lines:[{lyric:"",chords:[]}]});
    render();return;
  }
  if(action==="dup-section"){
    const si=parseInt(t.dataset.sec,10);
    const sec=State.ed.sections[si];
    const copy={name:sec.name+" (복제)",lines:sec.lines.map(ln=>({lyric:ln.lyric,chords:(ln.chords||[]).map(c=>({...c}))}))};
    State.ed.sections.splice(si+1,0,copy);
    render();
    showToast(`"${sec.name}" 섹션 복제됨`,"success");
    return;
  }
  if(action==="delete-section"){
    const si=parseInt(t.dataset.sec,10);
    if(State.ed.sections.length<=1){showToast("최소 1개 섹션이 필요해요","info");return;}
    const name=State.ed.sections[si].name;
    if(!confirm(`"${name}" 섹션을 삭제하시겠습니까?`)) return;
    State.ed.sections.splice(si,1);
    render();return;
  }
  if(action==="move-sec-up"){
    const si=parseInt(t.dataset.sec,10);
    if(si<=0) return;
    [State.ed.sections[si-1],State.ed.sections[si]]=[State.ed.sections[si],State.ed.sections[si-1]];
    render();return;
  }
  if(action==="move-sec-down"){
    const si=parseInt(t.dataset.sec,10);
    if(si>=State.ed.sections.length-1) return;
    [State.ed.sections[si],State.ed.sections[si+1]]=[State.ed.sections[si+1],State.ed.sections[si]];
    render();return;
  }
  if(action==="add-line-in-sec"){
    const si=parseInt(t.dataset.sec,10);
    State.ed.sections[si].lines.push({lyric:"",chords:[]});
    render();return;
  }
  if(action==="delete-line"){
    const si=parseInt(t.dataset.sec,10);
    const li=parseInt(t.dataset.line,10);
    const sec=State.ed.sections[si];
    if(sec.lines.length>1) sec.lines.splice(li,1);
    else sec.lines[0]={lyric:"",chords:[]};
    render();return;
  }

  if(action==="click-char"){
    if(e.target.classList.contains("inline-chord-input")) return;
    const secIdx=parseInt(t.dataset.sec,10);
    const lineIdx=parseInt(t.dataset.line,10);
    const pos=parseInt(t.dataset.pos,10);
    openChordEditor(secIdx,lineIdx,pos);
    return;
  }
  if(action==="toggle-preview"){
    State.ed.preview=!State.ed.preview;
    t.textContent=State.ed.preview?"✏️ 편집":"👁 미리보기";
    const p=document.getElementById("preview-wrap");
    if(p) p.innerHTML=State.ed.preview?renderPreviewSheet():"";
    return;
  }
});

document.addEventListener("input",e=>{
  const t=e.target.closest("[data-action]");
  if(!t) return;
  const action=t.dataset.action;
  if(action==="search"){State.search=t.value;updateSongList();return;}
  if(action==="ed-title"){State.ed.title=t.value;return;}
  if(action==="ed-artist"){State.ed.artist=t.value;return;}
  if(action==="section-name"){
    const si=parseInt(t.dataset.sec,10);
    State.ed.sections[si].name=t.value;
    return;
  }
  if(action==="inline-chord"){
    if(State.ed.editing) State.ed.editing.value=t.value;
    return;
  }
  if(action==="lyric-change"){
    const si=parseInt(t.dataset.sec,10);
    const li=parseInt(t.dataset.line,10);
    const line=getLine(si,li);
    if(!line) return;
    line.lyric=t.value;
    line.chords=(line.chords||[]).filter(c=>c.pos<=[...t.value].length);
    rerenderLine(si,li);
    return;
  }
});

document.addEventListener("change",e=>{
  const t=e.target.closest("[data-action]");
  if(!t) return;
  if(t.dataset.action==="ed-key"){State.ed.originalKey=t.value;return;}
  if(t.dataset.action==="ed-cat"){State.ed.category=t.value;return;}
});

document.addEventListener("keydown",e=>{
  const t=e.target.closest("[data-action]");
  if(!t) return;

  if(t.dataset.action==="inline-chord"){
    if(e.key==="Enter"||e.key==="Tab"){e.preventDefault();closeChordEditor(true);return;}
    if(e.key==="Escape"){e.preventDefault();closeChordEditor(false);return;}
    if(e.key==="Backspace"&&t.value===""){
      e.preventDefault();
      if(State.ed.editing){State.ed.editing.value="";closeChordEditor(true);}
      return;
    }
    return;
  }

  if(t.dataset.action==="lyric-change"&&e.key==="Enter"&&!e.shiftKey){
    e.preventDefault();
    const si=parseInt(t.dataset.sec,10);
    const li=parseInt(t.dataset.line,10);
    const sec=State.ed.sections[si];
    sec.lines.splice(li+1,0,{lyric:"",chords:[]});
    render();
    requestAnimationFrame(()=>{
      const newInput=document.querySelector(`[data-action="lyric-change"][data-sec="${si}"][data-line="${li+1}"]`);
      if(newInput) newInput.focus();
    });
    return;
  }
});

/* 인라인 코드 입력에서 포커스 벗어나면 자동 저장 */
document.addEventListener("focusout",e=>{
  if(!e.target.classList||!e.target.classList.contains("inline-chord-input")) return;
  // 약간의 딜레이 - 다른 곳 클릭 이벤트가 먼저 처리되도록
  setTimeout(()=>{
    if(State.ed.editing){
      // 현재 값으로 업데이트
      State.ed.editing.value=e.target.value;
      closeChordEditor(true);
    }
  },100);
});

/* 기존 코드 마크(초록 배지) 클릭하면 수정 모드로 열기 */
document.addEventListener("click",e=>{
  if(e.target.classList&&e.target.classList.contains("click-chord-mark")){
    const cell=e.target.closest(".click-chord-cell");
    if(!cell) return;
    const pos=parseInt(cell.dataset.chordCell,10);
    const zone=cell.closest(".click-zone");
    if(!zone) return;
    // data-click-zone="secIdx-lineIdx" 형식
    const parts=zone.dataset.clickZone.split("-");
    const secIdx=parseInt(parts[0],10);
    const lineIdx=parseInt(parts[1],10);
    e.stopPropagation();
    openChordEditor(secIdx,lineIdx,pos);
  }
});

/* ═══ INIT ═══ */
render();
loadSongsFromServer();
</script>
</body>
</html>
