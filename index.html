<style>
    /* 1. 기본 배경 및 폰트 */
    body { background-color: #F8F8F5; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }

    /* 2. 전체를 감싸는 틀: 모바일 축소의 핵심 */
    .viewport-wrapper {
        width: 100%;
        overflow-x: hidden; /* 가로 스크롤 방지 */
        display: flex;
        justify-content: center;
        background-color: #F8F8F5;
    }

    /* 3. 실제 악보가 그려지는 '종이' (800px 고정) */
    .sheet-paper {
        width: 800px; 
        min-height: 100vh;
        background-color: white;
        padding: 40px 20px;
        box-shadow: 0 0 20px rgba(0,0,0,0.05);
        transform-origin: top center; /* 축소 기준점 */
        position: relative;
    }

    /* 4. 모바일용 자동 축소 엔진 */
    @media (max-width: 800px) {
        .sheet-paper {
            /* 화면 너비에 맞춰서 800px 종이를 통째로 줄임 */
            transform: scale(calc(window.innerWidth / 800)); 
            /* 위 계산이 복잡하면 아래처럼 고정 비율을 써도 됩니다 */
            transform: scale(0.45); /* 아이폰 일반 기준 약 0.4~0.5 */
            margin-top: -200px; /* 축소로 인한 상단 빈공간 제거 (수치 조절 필요) */
        }
    }

    /* 5. 악보 한 줄의 정밀한 구조 */
    .score-row {
        position: relative;
        width: 100%;
        margin-bottom: 4rem; /* 줄 간격 */
    }

    /* 가사 입력창: 종이 너비(800px)를 꽉 채움 */
    .lyrics-input {
        width: 100%;
        font-size: 1.25rem;
        border: none;
        border-bottom: 1px solid #eee;
        outline: none;
        letter-spacing: 0.1em;
        padding-bottom: 10px;
        background: transparent;
    }

    /* 코드 레이어: 가사 바로 위에 60개 칸 유지 */
    .chord-grid {
        display: grid;
        grid-template-columns: repeat(60, 1fr);
        position: absolute;
        top: -1.8rem;
        width: 100%;
        height: 1.8rem;
    }

    /* 코드 한 칸 */
    .chord-cell {
        border-left: 1px solid rgba(0,0,0,0.03);
        height: 100%;
        position: relative;
    }

    /* 실제 표시되는 코드 글자 */
    .chord-badge {
        position: absolute;
        top: 0;
        left: 0;
        transform: translateX(-50%);
        background: #2F5233;
        color: white;
        font-size: 11px;
        padding: 2px 6px;
        border-radius: 4px;
        font-weight: bold;
        white-space: nowrap;
    }
</style>
