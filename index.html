<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>울로콜리: 비주얼 가이드 에디터 🥦</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #F8F8F5; color: #333; font-family: 'Pretendard', sans-serif; }
        .font-broccoli { font-family: 'Gaegu', cursive; }

        /* [핵심] 모바일에서 가사 잘림 방지: 화면이 900px보다 작아지면 통째로 축소 */
        .scale-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .main-card {
            width: 900px; /* PC 기준 정밀한 너비 */
            background-color: white;
            border-radius: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            position: relative;
            transform-origin: top center;
            flex-shrink: 0;
        }

        @media (max-width: 900px) {
            .main-card {
                /* 화면 너비에 맞춰서 카드를 통째로 줄여버림 */
                transform: scale(calc(100vw / 950)); 
                margin-top: 20px;
            }
            .scale-wrapper { height: auto; margin-bottom: -150px; }
        }

        /* 한울님의 원본 스타일 그대로 복구 */
        .magic-row { position: relative; margin-bottom: 2.5rem; }
        .magic-lyrics { 
            width: 100%; font-size: 1.25rem; border: none; background: transparent; 
            letter-spacing: 0.1em; outline: none; border-bottom: 1px solid #e0e0e0;
            padding-bottom: 8px; z-index: 10; position: relative;
        }
        .magic-chords-layer { 
            display: grid; grid-template-columns: repeat(60, 1fr); 
            position: absolute; top: -1.7rem; width: 100%; height: 1.7rem; z-index: 5;
        }
        .chord-slot { border-left: 1px solid #f0f0f0; height: 100%; position: relative; cursor: cell; }
        .chord-slot:hover { border-left-color: #9DC183; background-color: #f0fdf4; }
        .chord-slot input {
            position: absolute; top: 0; left: 0; width: 45px; background: #2F5233;
            color: white; font-size: 10px; font-weight: bold; border-radius: 4px;
            text-align: center; border: none; outline: none; z-index: 20; transform: translateX(-50%);
        }
        .res-line { position: relative; margin-bottom: 3.5rem; padding-top: 1.7rem; }
        .res-chords { position: absolute; top: 0; width: 100%; display: grid; grid-template-columns: repeat(60, 1fr); gap: 2px; }
        .res-chord-val { text-align: center; font-weight: 800; color: #2F5233; font-size: 0.9rem; white-space: nowrap; transform: translateX(-50%); }
        .res-lyrics-val { font-size: 1.2rem; letter-spacing: 0.1em; white-space: pre; border-bottom: 1px solid #f8f8f8; padding-bottom: 4px; }
    </style>
</head>
<body>

<nav class="bg-white/90 backdrop-blur-md border-b border-[#9DC183] p-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
    <div class="flex items-center gap-2 cursor-pointer" onclick="window.showView('visitor')">
        <span class="text-3xl inline-block">🥦</span>
        <h1 class="text-2xl font-black text-[#2F5233] font-broccoli tracking-tighter">울로콜리 악보 제작소</h1>
    </div>
    <div class="flex gap-6 font-bold text-xs">
        <span onclick="window.showView('admin')" class="cursor-pointer text-gray-400 hover:text-[#2F5233]">새 악보 제작</span>
        <span onclick="window.showView('visitor')" class="cursor-pointer text-[#2F5233]">악보 보관소</span>
    </div>
</nav>

<div class="scale-wrapper">
    <section id="view-admin" class="hidden p-8">
        <div class="main-card p-10 border border-gray-100">
            <div class="flex justify-between items-center mb-10 pb-6 border-b border-gray-100">
                <h2 class="text-3xl font-black text-[#2F5233] font-broccoli tracking-tight flex items-center gap-3">✨ <span class="text-gray-900">정밀 핀 포인트 에디터</span></h2>
                <div class="flex gap-2">
                    <button onclick="window.addRow()" class="bg-[#F0F4F0] text-[#2F5233] px-5 py-2.5 rounded-full text-xs font-bold transition-all hover:bg-[#9DC183] hover:text-white">+ 마디 추가</button>
                    <button onclick="window.saveMagicSheet()" class="bg-[#2F5233] text-white px-5 py-2.5 rounded-full text-xs font-bold transition-all hover:bg-[#1b3a1e]">🥦 숲에 심기</button>
                </div>
            </div>
            <div id="magic-container" class="space-y-16"></div>
        </div>
    </section>

    <section id="view-detail" class="hidden p-8">
        <div class="main-card p-12 border-t-8 border-[#2F5233]">
            <button onclick="window.showView('visitor')" class="absolute top-10 right-10 text-gray-300 hover:text-red-400 font-bold">✕ 닫기</button>
            <div class="mb-12 text-center">
                <h2 id="det-title" class="text-4xl font-black text-[#2F5233] font-broccoli mb-4"></h2>
                <div class="mt-6 flex justify-center gap-2 bg-gray-50 inline-flex p-1.5 rounded-full shadow-inner border">
                    <button onclick="window.transposeAll(-1)" class="w-12 h-12 rounded-full font-bold hover:bg-white transition-all text-[#2F5233]">♭</button>
                    <div id="current-offset" class="flex items-center px-5 font-black text-[#9DC183] text-lg">0</div>
                    <button onclick="window.transposeAll(1)" class="w-12 h-12 rounded-full font-bold hover:bg-white transition-all text-[#2F5233]">♯</button>
                </div>
            </div>
            <div id="det-content"></div>
        </div>
    </section>
</div>

<section id="view-visitor" class="max-w-6xl mx-auto p-8">
    <div id="archive-list" class="grid grid-cols-1 gap-3"></div>
</section>

<script type="module">
    // (이하 Firebase 및 JS 로직은 한울님 원본과 100% 동일하게 유지)
    // ... 한울님의 Firebase Config 및 함수들 ...
</script>
</body>
</html>
