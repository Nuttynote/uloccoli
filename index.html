/* ═══ SUPABASE API ═══ */
const SB_HEADERS = {
  "apikey": SUPABASE_ANON_KEY,
  "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
  "Content-Type": "application/json",
  "Prefer": "return=representation"
};

async function sbFetchSongs(){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/songs?select=*&order=created_at.desc`,{
    headers: SB_HEADERS
  });
  if(!res.ok) throw new Error("악보를 불러오지 못했습니다");
  const data = await res.json();
  // Convert from DB format (original_key) to JS format (originalKey)
  return data.map(row=>({
    id: row.id,
    title: row.title,
    artist: row.artist,
    originalKey: row.original_key,
    category: row.category,
    text: row.text
  }));
}

async function sbInsertSong(song){
  const body = {
    id: song.id,
    title: song.title,
    artist: song.artist,
    original_key: song.originalKey,
    category: song.category,
    text: song.text
  };
  const res = await fetch(`${SUPABASE_URL}/rest/v1/songs`,{
    method: "POST",
    headers: SB_HEADERS,
    body: JSON.stringify(body)
  });
  if(!res.ok){
    const err = await res.text();
    throw new Error("저장 실패: " + err);
  }
  return res.json();
}

async function sbUpdateSong(song){
  const body = {
    title: song.title,
    artist: song.artist,
    original_key: song.originalKey,
    category: song.category,
    text: song.text
  };
  const res = await fetch(`${SUPABASE_URL}/rest/v1/songs?id=eq.${encodeURIComponent(song.id)}`,{
    method: "PATCH",
    headers: SB_HEADERS,
    body: JSON.stringify(body)
  });
  if(!res.ok) throw new Error("수정 실패");
  return res.json();
}

async function sbDeleteSong(id){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/songs?id=eq.${encodeURIComponent(id)}`,{
    method: "DELETE",
    headers: SB_HEADERS
  });
  if(!res.ok) throw new Error("삭제 실패");
  return true;
}


/* ═══ CORE UTILS ═══ */
const CHROMATIC=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const FLAT_MAP={Db:"C#",Eb:"D#",Fb:"E",Gb:"F#",Ab:"G#",Bb:"A#",Cb:"B"};
const CATEGORIES=["전체","감사","사랑","예배","소망","고백"];

function normalizeNote(n){return FLAT_MAP[n]||n;}
function transposeChord(chord,semi){
  return chord.replace(/([A-G][#b]?)/g,m=>{
    const idx=CHROMATIC.indexOf(normalizeNote(m));
    if(idx===-1) return m;
    return CHROMATIC[(idx+semi+120)%12];
  });
}
function isWide(ch){
  const c=ch.charCodeAt(0);
  return (c>=0x1100&&c<=0x115F)||(c>=0x2E80&&c<=0x9FFF)||(c>=0xAC00&&c<=0xD7AF)||(c>=0xF900&&c<=0xFAFF)||(c>=0xFE10&&c<=0xFE6F)||(c>=0xFF01&&c<=0xFF60)||(c>=0xFFE0&&c<=0xFFE6);
}
function cellWidth(ch){return isWide(ch)?"2ch":"1ch";}
function escapeHtml(s){
  if(s==null) return "";
  return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function serialize(lines){
  return lines.map(ln=>{
    if(!ln.lyric&&(!ln.chords||ln.chords.length===0)) return "";
    if(!ln.chords||ln.chords.length===0) return ln.lyric||"";
    const sorted=[...ln.chords].sort((a,b)=>a.pos-b.pos);
    let r="",last=0;
    for(const c of sorted){
      r+=(ln.lyric||"").slice(last,c.pos)+"["+c.chord+"]";
      last=c.pos;
    }
    r+=(ln.lyric||"").slice(last);
    return r;
  }).join("\n");
}

function deserialize(text){
  if(!text) return [{lyric:"",chords:[]}];
  return text.split("\n").map(raw=>{
    if(!raw.trim()) return {lyric:"",chords:[]};
    if(!raw.includes("[")) return {lyric:raw,chords:[]};
    const chords=[];
    let lyric="";
    const re=/\[([^\]]+)\]/g;
    let last=0,m;
    while((m=re.exec(raw))!==null){
      lyric+=raw.slice(last,m.index);
      chords.push({pos:lyric.length,chord:m[1]});
      last=re.lastIndex;
    }
    lyric+=raw.slice(last);
    return {lyric,chords};
  });
}

/* ═══ TOAST ═══ */
function showToast(msg,type="info"){
  const container=document.getElementById("toast-container");
  const toast=document.createElement("div");
  toast.className=`toast ${type}`;
  toast.textContent=msg;
  container.appendChild(toast);
  setTimeout(()=>{
    toast.style.opacity="0";
    toast.style.transition="opacity .3s";
    setTimeout(()=>toast.remove(),300);
  },2500);
}

  const urlPassword=params.get("admin");
  if(urlPassword!==null){
    if(urlPassword===ADMIN_PASSWORD){
      sessionStorage.setItem(ADMIN_SESSION_KEY,"1");
      window.history.replaceState({},document.title,window.location.pathname+window.location.hash);
      return true;
    }else{
      alert("비밀번호가 올바르지 않습니다.");
      window.history.replaceState({},document.title,window.location.pathname+window.location.hash);
      return false;
    }
  }
  return sessionStorage.getItem(ADMIN_SESSION_KEY)==="1";
}

/* 코드 접미사(sus4, maj7, add9 등)를 작게 표시
   단, 분수코드(A/E, D/F#)는 전부 크게 유지 */
function formatChordHtml(chord){
  // 분수코드 분리: "A/E", "D/F#", "G/B" 등
  const slashMatch=chord.match(/^([A-G][#b]?[^/]*)(\/[A-G][#b]?)$/);
  if(slashMatch){
    // 앞부분(A, Am, Am7 등)은 포맷 적용, /E 부분은 루트 크기로
    const front=formatChordPart(slashMatch[1]);
    const bass=`<span class="chord-root">${escapeHtml(slashMatch[2])}</span>`;
    return front+bass;
  }
  return formatChordPart(chord);
}

function formatChordPart(part){
  const m=part.match(/^([A-G][#b]?)(m(?!aj)|M)?(.*)$/);
  if(!m) return escapeHtml(part);
  const root=m[1]+(m[2]||""); // "A", "Am", "C#m" 등 - 루트+m은 크게
  const tail=m[3]||"";        // "7", "sus4", "maj7", "add9" 등 - 작게
  if(!tail) return `<span class="chord-root">${escapeHtml(root)}</span>`;
  return `<span class="chord-root">${escapeHtml(root)}</span><span class="chord-suffix">${escapeHtml(tail)}</span>`;
}

function renderChordLine(lyric,chords,transpose){
  if(!lyric&&(!chords||chords.length===0)) return `<div style="height:14px"></div>`;
  if((!lyric||!lyric.trim())&&chords&&chords.length>0){
    return `<div class="chord-only-row">${chords.map(c=>`<span class="chord-badge">${formatChordHtml(transposeChord(c.chord,transpose))}</span>`).join("")}</div>`;
  }
  const chars=[...lyric];
  const chordAt={};
  (chords||[]).forEach(c=>{chordAt[c.pos]=transposeChord(c.chord,transpose);});

  const sorted=[...(chords||[])].sort((a,b)=>a.pos-b.pos);
  const extraWidth={};

  for(let ci=0;ci<sorted.length;ci++){
    const c=sorted[ci];
    const chordText=transposeChord(c.chord,transpose);
    const chordLen=chordText.length+1;
    const nextPos=ci<sorted.length-1?sorted[ci+1].pos:chars.length;
    let availWidth=0;
    for(let j=c.pos;j<nextPos;j++){
      availWidth+=isWide(chars[j])?2:1;
    }
    if(chordLen>availWidth){
      extraWidth[c.pos]=(extraWidth[c.pos]||0)+(chordLen-availWidth);
    }
  }

  const chordRow=chars.map((ch,i)=>{
    const baseW=isWide(ch)?2:1;
    const extra=extraWidth[i]||0;
    const totalW=baseW+extra;
    const chord=chordAt[i];
    return `<span class="pos-chord-cell" style="width:${totalW}ch">${chord?`<span class="pos-chord-text">${formatChordHtml(chord)}</span>`:""}</span>`;
  }).join("");
  const lyricRow=chars.map((ch,i)=>{
    const baseW=isWide(ch)?2:1;
    const extra=extraWidth[i]||0;
    const totalW=baseW+extra;
    return `<span class="pos-lyric-cell" style="width:${totalW}ch">${escapeHtml(ch)}</span>`;
  }).join("");
  return `<div class="pos-line"><div class="pos-chord-row">${chordRow}</div><div class="pos-lyric-row">${lyricRow}</div></div>`;
}

function renderSheet(song,transpose){
  const lines=deserialize(song.text);
  return `<div class="sheet-card"><div class="sheet">${lines.map(ln=>renderChordLine(ln.lyric,ln.chords,transpose)).join("")}</div></div>`;
}

function renderLineEditor(ln,idx){
  const chars=ln.lyric?[...ln.lyric]:[];
  const chordMap={};
  (ln.chords||[]).forEach(c=>{chordMap[c.pos]=c.chord;});
  const editing=State.ed.editing;
  const isEditingThisLine=editing&&editing.lineIdx===idx;

  const chordRow=chars.map((ch,pos)=>{
    const w=cellWidth(ch);
    const chord=chordMap[pos];
    const isEditing=isEditingThisLine&&editing.pos===pos;
    let inner="";
    if(isEditing){
      inner=`<input class="inline-chord-input" data-action="inline-chord" data-line="${idx}" data-pos="${pos}" value="${escapeHtml(editing.value||"")}" placeholder="코드" autocomplete="off"/>`;
    }else if(chord){
      inner=`<span class="click-chord-mark pos-chord-text">${escapeHtml(chord)}</span>`;
    }
    return `<span class="click-chord-cell" data-chord-cell="${pos}" style="width:${w}">${inner}</span>`;
  }).join("");

  const lyricRow=chars.map((ch,pos)=>{
    const hasChord=!!chordMap[pos];
    const isEditing=isEditingThisLine&&editing.pos===pos;
    const cls=["click-lyric-cell"];
    if(hasChord) cls.push("has-chord");
    if(isEditing) cls.push("editing");
    const display=ch===" "?"&nbsp;":escapeHtml(ch);
    return `<span class="${cls.join(" ")}" style="width:${cellWidth(ch)}" data-action="click-char" data-line="${idx}" data-pos="${pos}">${display}</span>`;
  }).join("");

  const isSelected=State.ed.selectedLines.has(idx);

  return `
    <div class="editor-line ${isSelected?"selected":""}" data-line-idx="${idx}">
      <div class="editor-line-header">
        <input type="checkbox" class="line-checkbox" data-action="toggle-select" data-line="${idx}" ${isSelected?"checked":""} title="선택"/>
        <input class="editor-lyric-input" value="${escapeHtml(ln.lyric||"")}" placeholder="가사를 입력하세요" data-action="lyric-change" data-line="${idx}"/>
        <button class="editor-line-delete" data-action="delete-line" data-line="${idx}">✕</button>
      </div>
      <div class="click-zone" data-click-zone="${idx}" style="${chars.length===0?'display:none':''}">
        <div class="click-chord-row" data-chord-row="${idx}">${chordRow}</div>
        <div class="click-lyric-row" data-lyric-row="${idx}">${lyricRow}</div>
      </div>
    </div>`;
}

function updateChordCell(lineIdx,pos){
  const line=State.ed.lines[lineIdx];
  const chord=(line.chords||[]).find(c=>c.pos===pos)?.chord;
  const cell=document.querySelector(`[data-chord-row="${lineIdx}"] [data-chord-cell="${pos}"]`);
  if(cell) cell.innerHTML=chord?`<span class="click-chord-mark pos-chord-text">${escapeHtml(chord)}</span>`:"";
  const lyricCell=document.querySelector(`[data-lyric-row="${lineIdx}"] [data-pos="${pos}"][data-line="${lineIdx}"]`);
  if(lyricCell){
    if(chord) lyricCell.classList.add("has-chord");
    else lyricCell.classList.remove("has-chord");
  }
}

// Close any open chord input and save its value
function closeChordEditor(save=true){
  const editing=State.ed.editing;
  if(!editing) return;
  const {lineIdx,pos,value}=editing;
  if(save){
    const line=State.ed.lines[lineIdx];
    const trimmed=(value||"").trim();
    if(trimmed){
      // 기존 코드 있으면 교체, 없으면 추가
      line.chords=[...(line.chords||[]).filter(c=>c.pos!==pos),{pos,chord:trimmed}];
    }else{
      // 빈 값이면 코드 삭제
      line.chords=(line.chords||[]).filter(c=>c.pos!==pos);
    }
  }
  State.ed.editing=null;
  // 해당 셀만 다시 그리기
  const cell=document.querySelector(`[data-chord-row="${lineIdx}"] [data-chord-cell="${pos}"]`);
  const lyricCell=document.querySelector(`[data-lyric-row="${lineIdx}"] [data-pos="${pos}"][data-line="${lineIdx}"]`);
  const line=State.ed.lines[lineIdx];
  const chord=(line.chords||[]).find(c=>c.pos===pos)?.chord;
  if(cell) cell.innerHTML=chord?`<span class="click-chord-mark pos-chord-text">${escapeHtml(chord)}</span>`:"";
  if(lyricCell){
    if(chord) lyricCell.classList.add("has-chord");
    else lyricCell.classList.remove("has-chord");
    lyricCell.classList.remove("editing");
  }
}

// Open chord input at given cell
function openChordEditor(lineIdx,pos){
  // 이미 다른 곳 편집 중이면 먼저 저장
  if(State.ed.editing) closeChordEditor(true);

  const line=State.ed.lines[lineIdx];
  const existing=(line.chords||[]).find(c=>c.pos===pos)?.chord||"";
  State.ed.editing={lineIdx,pos,value:existing};

  // 해당 셀에 input 삽입
  const cell=document.querySelector(`[data-chord-row="${lineIdx}"] [data-chord-cell="${pos}"]`);
  const lyricCell=document.querySelector(`[data-lyric-row="${lineIdx}"] [data-pos="${pos}"][data-line="${lineIdx}"]`);
  if(cell){
    cell.innerHTML=`<input class="inline-chord-input" data-action="inline-chord" data-line="${lineIdx}" data-pos="${pos}" value="${escapeHtml(existing)}" placeholder="코드" autocomplete="off"/>`;
    const input=cell.querySelector("input");
    if(input){
      input.focus();
      input.select();
    }
  }
  if(lyricCell) lyricCell.classList.add("editing");
}

function rerenderLine(idx){
  const ln=State.ed.lines[idx];
  const lineEl=document.querySelector(`[data-line-idx="${idx}"]`);
  if(!lineEl) return;
  const zone=lineEl.querySelector(`[data-click-zone="${idx}"]`);
  if(!zone) return;
  const chars=ln.lyric?[...ln.lyric]:[];
  if(chars.length===0){zone.style.display="none";return;}
  zone.style.display="";
  const chordMap={};
  (ln.chords||[]).forEach(c=>{chordMap[c.pos]=c.chord;});
  const chordRow=chars.map((ch,pos)=>{
    const w=cellWidth(ch);
    const chord=chordMap[pos];
    return `<span class="click-chord-cell" data-chord-cell="${pos}" style="width:${w}">${chord?`<span class="click-chord-mark pos-chord-text">${escapeHtml(chord)}</span>`:""}</span>`;
  }).join("");
  const lyricRow=chars.map((ch,pos)=>{
    const hasChord=!!chordMap[pos];
    const cls=["click-lyric-cell"];
    if(hasChord) cls.push("has-chord");
    const display=ch===" "?"&nbsp;":escapeHtml(ch);
    return `<span class="${cls.join(" ")}" style="width:${cellWidth(ch)}" data-action="click-char" data-line="${idx}" data-pos="${pos}">${display}</span>`;
  }).join("");
  const chordRowEl=zone.querySelector(`[data-chord-row="${idx}"]`);
  const lyricRowEl=zone.querySelector(`[data-lyric-row="${idx}"]`);
  if(chordRowEl) chordRowEl.innerHTML=chordRow;
  if(lyricRowEl) lyricRowEl.innerHTML=lyricRow;

  const song=State.songs.find(s=>s.id===id);
  if(!song) return;
  if(!confirm(`"${song.title}" 악보를 정말 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`)) return;
  try{
    await sbDeleteSong(id);
    State.songs=State.songs.filter(s=>s.id!==id);
    if(State.selectedSongId===id){State.selectedSongId=null;State.view="list";}
    if(State.editSongId===id){State.editSongId=null;State.view="list";}
    render();
    showToast("삭제되었습니다","success");
  }catch(e){
    showToast("삭제 실패: "+e.message,"error");
  }
}

/* ═══ SAVE ═══ */
async function saveCurrentSong(){
  const ed=State.ed;
  if(!ed.title.trim()){alert("제목을 입력해주세요");return;}
  State.saving=true;
  render();
  const text=serialize(ed.lines);
  const isUpdate=!!State.editSongId;
  const id=State.editSongId||"s"+Date.now();
  const songData={id,title:ed.title,artist:ed.artist,originalKey:ed.originalKey,category:ed.category,text};
  try{
    if(isUpdate){
      await sbUpdateSong(songData);
      State.songs=State.songs.map(s=>s.id===id?songData:s);
    }else{
      await sbInsertSong(songData);
      State.songs=[songData,...State.songs];
    }
    State.saving=false;
    State.view="list";
    State.editSongId=null;
    render();
    showToast(isUpdate?"수정되었습니다":"저장되었습니다","success");
  }catch(e){
    State.saving=false;
    render();
    showToast("저장 실패: "+e.message,"error");
  }
}

/* ═══ EVENTS ═══ */
document.addEventListener("click",e=>{
  const t=e.target.closest("[data-action]");
  if(!t) return;
  const action=t.dataset.action;

  if(action==="reload"){loadSongsFromServer();return;}
  if(action==="cat"){State.activeCat=t.dataset.cat;updateCatSelection();updateSongList();return;}
  if(action==="logout"){logoutAdmin();return;}
  if(action==="open-song"){
    State.selectedSongId=t.dataset.id;State.transpose=0;State.view="song";render();return;
  }
  if(action==="back-list"){State.view="list";render();return;}
  if(action==="transpose"){State.transpose+=parseInt(t.dataset.dir,10);updateTransposeDisplay();return;}
  if(action==="transpose-reset"){State.transpose=0;updateTransposeDisplay();return;}

  if(action==="new-song"){
    if(!requireAdmin()) return;
    State.editSongId=null;initEditor(null);State.view="editor";render();return;
  }
  if(action==="edit-song"){
    if(!requireAdmin()) return;
    e.stopPropagation();
    const song=State.songs.find(s=>s.id===t.dataset.id);
    State.editSongId=t.dataset.id;initEditor(song);State.view="editor";render();return;
  }
  if(action==="delete-song-from-list"){
    if(!requireAdmin()) return;
    e.stopPropagation();
    deleteSong(t.dataset.id);return;
  }
  if(action==="delete-song-from-view"){if(!requireAdmin()) return;deleteSong(t.dataset.id);return;}
  if(action==="delete-song-from-editor"){if(!requireAdmin()) return;deleteSong(State.editSongId);return;}
  if(action==="save-song"){if(!requireAdmin()) return;saveCurrentSong();return;}

  if(action==="add-line"){
    State.ed.lines.push({lyric:"",chords:[]});
    const wrap=document.getElementById("lines-wrap");
    if(wrap){
      const div=document.createElement("div");
      div.innerHTML=renderLineEditor(State.ed.lines[State.ed.lines.length-1],State.ed.lines.length-1);
      wrap.appendChild(div.firstElementChild);
    }
    return;
  }
  if(action==="delete-line"){
    const idx=parseInt(t.dataset.line,10);
    State.ed.selectedLines.delete(idx);
    // selectedLines 중 idx보다 큰 것들 1씩 감소
    const newSet=new Set();
    State.ed.selectedLines.forEach(i=>{if(i<idx) newSet.add(i); else if(i>idx) newSet.add(i-1);});
    State.ed.selectedLines=newSet;
    if(State.ed.lines.length>1){State.ed.lines.splice(idx,1);render();}
    else{State.ed.lines[0]={lyric:"",chords:[]};State.ed.selectedLines.clear();render();}
    return;
  }
  if(action==="toggle-select"){
    const idx=parseInt(t.dataset.line,10);
    if(State.ed.selectedLines.has(idx)) State.ed.selectedLines.delete(idx);
    else State.ed.selectedLines.add(idx);
    // 해당 라인의 UI만 업데이트
    const lineEl=document.querySelector(`[data-line-idx="${idx}"]`);
    if(lineEl) lineEl.classList.toggle("selected",State.ed.selectedLines.has(idx));
    const countEl=document.getElementById("select-count");
    if(countEl) countEl.textContent=State.ed.selectedLines.size>0?State.ed.selectedLines.size+"줄 선택됨":"";
    return;
  }
  if(action==="select-all"){
    State.ed.lines.forEach((_,i)=>State.ed.selectedLines.add(i));
    document.querySelectorAll(".editor-line").forEach(el=>el.classList.add("selected"));
    document.querySelectorAll(".line-checkbox").forEach(cb=>cb.checked=true);
    const countEl=document.getElementById("select-count");
    if(countEl) countEl.textContent=State.ed.selectedLines.size+"줄 선택됨";
    return;
  }
  if(action==="deselect-all"){
    State.ed.selectedLines.clear();
    document.querySelectorAll(".editor-line").forEach(el=>el.classList.remove("selected"));
    document.querySelectorAll(".line-checkbox").forEach(cb=>cb.checked=false);
    const countEl=document.getElementById("select-count");
    if(countEl) countEl.textContent="";
    return;
  }
  if(action==="duplicate-selected"){
    if(State.ed.selectedLines.size===0){showToast("복제할 줄을 먼저 선택해주세요","info");return;}
    // 선택된 줄들을 순서대로 복제
    const indices=[...State.ed.selectedLines].sort((a,b)=>a-b);
    const copies=indices.map(i=>({
      lyric:State.ed.lines[i].lyric,
      chords:(State.ed.lines[i].chords||[]).map(c=>({...c}))
    }));
    // 마지막 선택된 줄 다음에 삽입
    const insertAt=Math.max(...indices)+1;
    State.ed.lines.splice(insertAt,0,...copies);
    // 선택 해제 후 새로 복제된 줄들을 선택
    State.ed.selectedLines.clear();
    for(let i=0;i<copies.length;i++) State.ed.selectedLines.add(insertAt+i);
    render();
    showToast(`${copies.length}줄 복제됨`,"success");
    return;
  }
  if(action==="click-char"){
    // 입력창 자체를 클릭한 경우는 무시 (포커스 유지)
    if(e.target.classList.contains("inline-chord-input")) return;
    const lineIdx=parseInt(t.dataset.line,10);
    const pos=parseInt(t.dataset.pos,10);
    openChordEditor(lineIdx,pos);
    return;
  }
  if(action==="toggle-preview"){
    State.ed.preview=!State.ed.preview;
    t.textContent=State.ed.preview?"✏️ 편집":"👁 미리보기";
    const p=document.getElementById("preview-wrap");
    if(p) p.innerHTML=State.ed.preview?renderPreviewSheet():"";
    return;
  }
});

document.addEventListener("input",e=>{
  const t=e.target.closest("[data-action]");
  if(!t) return;
  const action=t.dataset.action;
  if(action==="search"){State.search=t.value;updateSongList();return;}
  if(action==="ed-title"){State.ed.title=t.value;return;}
  if(action==="ed-artist"){State.ed.artist=t.value;return;}
  if(action==="inline-chord"){
    // 인라인 코드 입력 중 값만 state에 저장 (아직 확정 안 함)
    if(State.ed.editing) State.ed.editing.value=t.value;
    return;
  }
  if(action==="lyric-change"){
    const idx=parseInt(t.dataset.line,10);
    const val=t.value;
    const line=State.ed.lines[idx];
    line.lyric=val;
    line.chords=(line.chords||[]).filter(c=>c.pos<=[...val].length);
    rerenderLine(idx);
    return;
  }
});

document.addEventListener("change",e=>{
  const t=e.target.closest("[data-action]");
  if(!t) return;
  if(t.dataset.action==="ed-key"){State.ed.originalKey=t.value;return;}
  if(t.dataset.action==="ed-cat"){State.ed.category=t.value;return;}
});

document.addEventListener("keydown",e=>{
  const t=e.target.closest("[data-action]");
  if(!t) return;

  // 인라인 코드 입력 제어
  if(t.dataset.action==="inline-chord"){
    if(e.key==="Enter"||e.key==="Tab"){
      e.preventDefault();
      closeChordEditor(true);
      return;
    }
    if(e.key==="Escape"){
      e.preventDefault();
      closeChordEditor(false);
      return;
    }
    if(e.key==="Backspace"&&t.value===""){
      // 빈 상태에서 백스페이스 → 기존 코드 삭제
      e.preventDefault();
      if(State.ed.editing){
        State.ed.editing.value="";
        closeChordEditor(true);  // 빈 값이면 내부적으로 삭제 처리됨
      }
      return;
    }
    return;
  }

  // 가사 입력에서 Enter = 새 줄 추가하고 포커스 이동
  if(t.dataset.action==="lyric-change"&&e.key==="Enter"&&!e.shiftKey){
    e.preventDefault();
    const currentIdx=parseInt(t.dataset.line,10);
    const newIdx=currentIdx+1;
    State.ed.lines.splice(newIdx,0,{lyric:"",chords:[]});
    const wrap=document.getElementById("lines-wrap");
    if(wrap){
      wrap.innerHTML=State.ed.lines.map((ln,idx)=>renderLineEditor(ln,idx)).join("");
      requestAnimationFrame(()=>{
        const newInput=document.querySelector(`[data-action="lyric-change"][data-line="${newIdx}"]`);
        if(newInput) newInput.focus();
      });
    }
    return;
  }
});

/* 인라인 코드 입력에서 포커스 벗어나면 자동 저장 */
document.addEventListener("focusout",e=>{
  if(!e.target.classList||!e.target.classList.contains("inline-chord-input")) return;
  // 약간의 딜레이 - 다른 곳 클릭 이벤트가 먼저 처리되도록
  setTimeout(()=>{
    if(State.ed.editing){
      // 현재 값으로 업데이트
      State.ed.editing.value=e.target.value;
      closeChordEditor(true);
    }
  },100);
});

/* 기존 코드 마크(초록 배지) 클릭하면 수정 모드로 열기 */
document.addEventListener("click",e=>{
  if(e.target.classList&&e.target.classList.contains("click-chord-mark")){
    // 부모 셀에서 line/pos 정보 찾기
    const cell=e.target.closest(".click-chord-cell");
    if(!cell) return;
    const pos=parseInt(cell.dataset.chordCell,10);
    // 같은 click-zone 안의 lyric-row에서 line idx 찾기
    const zone=cell.closest(".click-zone");
    if(!zone) return;
    const lineIdx=parseInt(zone.dataset.clickZone,10);
    e.stopPropagation();
    openChordEditor(lineIdx,pos);
  }
});

/* ═══ INIT ═══ */
render();
loadSongsFromServer();
</script>
</body>
